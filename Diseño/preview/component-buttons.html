<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-condensed); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .section-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--color-lab-gold); text-transform: uppercase; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  /* Primary button */
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 6px; background: #5AABDF; color: #060F20; font-family: var(--font-condensed); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: pointer; }
  .btn-primary:hover { background: #7DC3EE; }
  /* Ghost button */
  .btn-ghost { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 6px; background: transparent; color: #F0F8FF; font-family: var(--font-condensed); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid #1C3A68; cursor: pointer; }
  .btn-ghost:hover { border-color: rgba(90,171,223,0.5); color: #5AABDF; }
  /* Small condensed */
  .btn-sm { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 6px; background: transparent; color: #64748B; font-family: var(--font-condensed); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid #1C3A68; cursor: pointer; }
  /* Icon button */
  .btn-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(90,171,223,0.1); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(90,171,223,0.2); cursor: pointer; }
  /* Danger */
  .btn-danger { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; background: transparent; color: #F87171; font-family: var(--font-condensed); font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid rgba(248,113,113,0.3); cursor: pointer; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Primary</div>
    <div class="row">
      <button class="btn-primary">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Ver Fixture
      </button>
      <button class="btn-primary">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Clubes
      </button>
    </div>
  </div>
  <div>
    <div class="section-label">Ghost / Border</div>
    <div class="row">
      <button class="btn-ghost">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Clubes
      </button>
      <button class="btn-ghost" style="color:#5AABDF; border-color:rgba(90,171,223,0.5);">La Liga →</button>
    </div>
  </div>
  <div>
    <div class="section-label">Small / Utility</div>
    <div class="row">
      <button class="btn-sm">Ver todos →</button>
      <button class="btn-sm">Más →</button>
      <button class="btn-sm" style="color:#5AABDF; border-color:rgba(90,171,223,0.3);">Ver Roster →</button>
    </div>
  </div>
  <div>
    <div class="section-label">Admin Sizes</div>
    <div class="row">
      <button class="btn-primary" style="padding:7px 14px; font-size:11px;">Guardar</button>
      <button class="btn-ghost" style="padding:7px 14px; font-size:11px;">Cancelar</button>
      <button class="btn-danger">Eliminar</button>
      <div class="btn-icon">
        <svg width="16" height="16" fill="none" stroke="#5AABDF" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
