<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-condensed); padding: 16px; }
  .section-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--color-lab-gold); text-transform: uppercase; margin-bottom: 10px; }
  .trivia-card { background: #0F2040; border: 1px solid #1C3A68; border-radius: 12px; overflow: hidden; max-width: 420px; }
  .t-header { padding: 14px 16px; background: #162D54; border-bottom: 1px solid rgba(28,58,104,0.5); }
  .t-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .t-icon { color: #5AABDF; }
  .t-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #5AABDF; font-weight: 600; }
  .t-dots { display: flex; gap: 3px; margin-left: auto; }
  .t-dot { width: 7px; height: 7px; border-radius: 50%; }
  .t-question { font-family: var(--font-display); font-size: 17px; letter-spacing: 0.06em; color: #F0F8FF; line-height: 1.2; }
  .t-options { padding: 12px 14px; display: flex; flex-direction: column; gap: 7px; }
  .t-opt { padding: 10px 14px; border-radius: 8px; border: 1px solid; display: flex; align-items: center; gap: 10px; font-size: 12px; letter-spacing: 0.04em; }
  .t-letter { width: 22px; height: 22px; border-radius: 50%; border: 1px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="section-label">Trivia Card — Default state</div>
  <div class="trivia-card">
    <div class="t-header">
      <div class="t-meta">
        <svg class="t-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>
        <span class="t-label">Trivia</span>
        <div class="t-dots">
          <div class="t-dot" style="background:#5AABDF;"></div>
          <div class="t-dot" style="background:#5AABDF;"></div>
          <div class="t-dot" style="background:#1C3A68;"></div>
        </div>
      </div>
      <div class="t-question">¿En qué año fue fundada la Liga Argentina de Béisbol?</div>
    </div>
    <div class="t-options">
      <div class="t-opt" style="background:#0B1D3A; border-color:#1C3A68; color:#94A3B8;">
        <span class="t-letter">A</span> 2010
      </div>
      <div class="t-opt" style="background:#0B1D3A; border-color:#1C3A68; color:#94A3B8;">
        <span class="t-letter">B</span> 2014
      </div>
      <div class="t-opt" style="background:rgba(74,222,128,0.12); border-color:rgba(74,222,128,0.5); color:#4ADE80;">
        <span class="t-letter">C</span> 2017
        <svg style="margin-left:auto;" width="16" height="16" fill="none" stroke="#4ADE80" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="t-opt" style="background:rgba(248,113,113,0.12); border-color:rgba(248,113,113,0.4); color:#F87171; opacity:0.5;">
        <span class="t-letter">D</span> 2020
        <svg style="margin-left:auto;" width="16" height="16" fill="none" stroke="#F87171" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
    </div>
    <div style="margin:0 14px 14px; padding:10px 12px; border-radius:8px; background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3);">
      <div style="font-family:var(--font-display); font-size:16px; letter-spacing:0.08em; color:#4ADE80;">¡CORRECTO!</div>
      <div style="font-size:11px; color:#94A3B8; margin-top:3px; line-height:1.4;">La LAB fue fundada en 2017 con equipos en Salta, Córdoba y Buenos Aires.</div>
    </div>
  </div>
</body>
</html>
