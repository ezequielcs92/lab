<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-condensed); padding: 16px; }
  .section-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--color-lab-gold); text-transform: uppercase; margin-bottom: 8px; }
  .board { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
  .score-card { flex-shrink: 0; width: 220px; background: #0F2040; border: 1px solid #1C3A68; border-radius: 8px; overflow: hidden; }
  .sc-header { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-bottom: 1px solid rgba(28,58,104,0.5); }
  .sc-date { font-size: 10px; letter-spacing: 0.1em; color: #64748B; text-transform: uppercase; }
  .sc-status { font-size: 10px; letter-spacing: 0.1em; font-weight: 600; text-transform: uppercase; }
  .sc-body { padding: 10px; display: flex; flex-direction: column; gap: 7px; }
  .team-row { display: flex; align-items: center; justify-content: space-between; }
  .team-badge { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 11px; margin-right: 7px; flex-shrink: 0; }
  .team-name { font-size: 12px; letter-spacing: 0.04em; color: #94A3B8; }
  .team-name.winner { color: #F0F8FF; font-weight: 700; }
  .score { font-family: var(--font-display); font-size: 20px; }
  .live-dot { width: 7px; height: 7px; background: #2563EB; border-radius: 50%; animation: pulse-gold 1.5s ease-in-out infinite; display: inline-block; margin-right: 4px; }
</style>
</head>
<body>
  <div class="section-label">Scoreboard — Horizontal snap scroll, 272px cards</div>
  <div class="board">
    <!-- Finalizado -->
    <div class="score-card">
      <div class="sc-header">
        <span class="sc-date">Sáb 12 Abr</span>
        <span class="sc-status" style="color:#5AABDF;">Finalizado</span>
      </div>
      <div class="sc-body">
        <div class="team-row">
          <div style="display:flex;align-items:center;">
            <div class="team-badge" style="background:#1A3B6E; color:#E8C547;">F</div>
            <span class="team-name winner">Falcons</span>
          </div>
          <span class="score" style="color:#5AABDF;">7</span>
        </div>
        <div class="team-row">
          <div style="display:flex;align-items:center;">
            <div class="team-badge" style="background:#8B1A1A; color:#FFD700;">P</div>
            <span class="team-name">Patriots</span>
          </div>
          <span class="score" style="color:#94A3B8;">3</span>
        </div>
      </div>
      <div style="padding:0 10px 8px; text-align:center; font-size:10px; letter-spacing:0.1em; color:#5AABDF;">VER DETALLES →</div>
    </div>
    <!-- En Vivo -->
    <div class="score-card" style="border-color:rgba(37,99,235,0.4);">
      <div class="sc-header">
        <span class="sc-date">Hoy</span>
        <span class="sc-status" style="color:#60A5FA;"><span class="live-dot"></span>En Vivo</span>
      </div>
      <div class="sc-body">
        <div class="team-row">
          <div style="display:flex;align-items:center;">
            <div class="team-badge" style="background:#0A4C1A; color:#4ADE80;">C</div>
            <span class="team-name">Cachorros</span>
          </div>
          <span class="score" style="color:#F0F8FF;">4</span>
        </div>
        <div class="team-row">
          <div style="display:flex;align-items:center;">
            <div class="team-badge" style="background:#1A1A5E; color:#818CF8;">D</div>
            <span class="team-name">DAOM</span>
          </div>
          <span class="score" style="color:#F0F8FF;">2</span>
        </div>
      </div>
    </div>
    <!-- Programado -->
    <div class="score-card">
      <div class="sc-header">
        <span class="sc-date">Dom 20 Abr</span>
        <span class="sc-status" style="color:#64748B;">Programado</span>
      </div>
      <div class="sc-body">
        <div class="team-row">
          <div style="display:flex;align-items:center;">
            <div class="team-badge" style="background:#3B1A5E; color:#C084FC;">A</div>
            <span class="team-name">Arias</span>
          </div>
          <span class="score" style="color:#64748B;">—</span>
        </div>
        <div class="team-row">
          <div style="display:flex;align-items:center;">
            <div class="team-badge" style="background:#1A3B6E; color:#60A5FA;">P</div>
            <span class="team-name">Popeye</span>
          </div>
          <span class="score" style="color:#64748B;">—</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
