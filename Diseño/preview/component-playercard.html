<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-condensed); padding: 16px; }
  .section-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--color-lab-gold); text-transform: uppercase; margin-bottom: 10px; }
  .cards-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }

  /* Player trading card */
  .pcard { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
  .pcard:hover { transform: scale(1.04); }
  .pcard-bg { position: absolute; inset: 0; }
  .pcard-diamond { position: absolute; inset: 0; opacity: 0.1; }
  .pcard-content { position: relative; z-index: 2; display: flex; flex-direction: column; }
  .pcard-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px 4px; }
  .pos-badge { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.15em; padding: 2px 7px; border-radius: 4px; }
  .number { font-family: var(--font-display); font-size: 32px; line-height: 1; }
  .photo-area { display: flex; justify-content: center; margin: 0 12px; }
  .photo-placeholder { border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); letter-spacing: 0.05em; }
  .name-plate { margin: 8px 12px 0; border-radius: 6px; padding: 7px 10px; }
  .player-name { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.08em; line-height: 1.1; }
  .club-name { font-family: var(--font-condensed); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 1px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 6px 12px; }
  .stat { text-align: center; }
  .stat-val { font-family: var(--font-display); font-size: 14px; }
  .stat-lbl { font-family: var(--font-condensed); font-size: 9px; letter-spacing: 0.1em; color: #64748B; text-transform: uppercase; }
  .bottom-bar { height: 4px; width: 100%; }
</style>
</head>
<body>
  <div class="section-label">Player Trading Cards — sm / md / lg</div>
  <div class="cards-row">
    <!-- Small card -->
    <div class="pcard" style="width:180px; height:268px;">
      <div class="pcard-bg" style="background:linear-gradient(135deg,#1A3B6E 0%,#1A3B6Eee 40%,#E8C54733 100%);"></div>
      <div class="pcard-diamond" style="background-image:linear-gradient(45deg,transparent 49.5%,#E8C547 49.5%,#E8C547 50.5%,transparent 50.5%),linear-gradient(-45deg,transparent 49.5%,#E8C547 49.5%,#E8C547 50.5%,transparent 50.5%);background-size:18px 18px;"></div>
      <div class="pcard-content">
        <div class="pcard-topbar">
          <span class="pos-badge" style="background:#E8C547; color:#1A3B6E;">CF</span>
          <span class="number" style="color:#E8C547;">7</span>
        </div>
        <div class="photo-area">
          <div class="photo-placeholder" style="width:130px; height:150px; background:rgba(232,197,71,0.15); color:#E8C547; font-size:36px;">JR</div>
        </div>
        <div class="name-plate" style="background:rgba(232,197,71,0.15); border-left:3px solid #E8C547;">
          <div class="player-name" style="color:#F0F8FF;">Rodríguez</div>
          <div class="club-name" style="color:#E8C547;">Falcons</div>
        </div>
      </div>
      <div class="bottom-bar" style="background:linear-gradient(90deg,#E8C547,#FFF9E0,#E8C547); position:absolute; bottom:0;"></div>
    </div>

    <!-- Medium card with stats -->
    <div class="pcard" style="width:220px; height:340px;">
      <div class="pcard-bg" style="background:linear-gradient(135deg,#0A4C1A 0%,#0A4C1Aee 40%,#4ADE8033 100%);"></div>
      <div class="pcard-diamond" style="background-image:linear-gradient(45deg,transparent 49.5%,#4ADE80 49.5%,#4ADE80 50.5%,transparent 50.5%),linear-gradient(-45deg,transparent 49.5%,#4ADE80 49.5%,#4ADE80 50.5%,transparent 50.5%);background-size:18px 18px;"></div>
      <div class="pcard-content">
        <div class="pcard-topbar">
          <span class="pos-badge" style="background:#4ADE80; color:#0A4C1A;">P</span>
          <span class="number" style="color:#4ADE80;">22</span>
        </div>
        <div class="photo-area">
          <div class="photo-placeholder" style="width:170px; height:195px; background:rgba(74,222,128,0.12); color:#4ADE80; font-size:44px;">GM</div>
        </div>
        <div class="name-plate" style="background:rgba(74,222,128,0.15); border-left:3px solid #4ADE80;">
          <div class="player-name" style="color:#F0F8FF;">García Morales</div>
          <div class="club-name" style="color:#4ADE80;">Cachorros</div>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="stat-val" style="color:#4ADE80;">2.41</div><div class="stat-lbl">ERA</div></div>
          <div class="stat"><div class="stat-val" style="color:#4ADE80;">8</div><div class="stat-lbl">W</div></div>
          <div class="stat"><div class="stat-val" style="color:#4ADE80;">94</div><div class="stat-lbl">SO</div></div>
        </div>
      </div>
      <div class="bottom-bar" style="background:linear-gradient(90deg,#4ADE80,#D1FAE5,#4ADE80); position:absolute; bottom:0;"></div>
    </div>

    <!-- No photo fallback -->
    <div class="pcard" style="width:180px; height:268px;">
      <div class="pcard-bg" style="background:linear-gradient(135deg,#8B1A1A 0%,#8B1A1Aee 40%,#FFD70033 100%);"></div>
      <div class="pcard-diamond" style="background-image:linear-gradient(45deg,transparent 49.5%,#FFD700 49.5%,#FFD700 50.5%,transparent 50.5%),linear-gradient(-45deg,transparent 49.5%,#FFD700 49.5%,#FFD700 50.5%,transparent 50.5%);background-size:18px 18px;"></div>
      <div class="pcard-content">
        <div class="pcard-topbar">
          <span class="pos-badge" style="background:#FFD700; color:#8B1A1A;">SS</span>
          <span class="number" style="color:#FFD700;">14</span>
        </div>
        <div class="photo-area">
          <div class="photo-placeholder" style="width:130px; height:150px; background:rgba(255,215,0,0.1); color:#FFD700; font-size:36px;">LV</div>
        </div>
        <div class="name-plate" style="background:rgba(255,215,0,0.12); border-left:3px solid #FFD700;">
          <div class="player-name" style="color:#F0F8FF;">López Villa</div>
          <div class="club-name" style="color:#FFD700;">Patriots</div>
        </div>
      </div>
      <div class="bottom-bar" style="background:linear-gradient(90deg,#FFD700,#FFFDE7,#FFD700); position:absolute; bottom:0;"></div>
    </div>
  </div>
</body>
</html>
