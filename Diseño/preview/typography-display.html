<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-display); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-condensed); font-size: 9px; letter-spacing: 0.2em; color: var(--color-lab-muted); text-transform: uppercase; }
  .bar { display: flex; align-items: baseline; gap: 12px; }
</style>
</head>
<body>
  <div class="label">Bebas Neue — Display</div>
  <div class="bar">
    <div style="font-size:60px; letter-spacing:0.05em; color:#F0F8FF; line-height:1;">LIGA ARGENTINA</div>
  </div>
  <div class="bar">
    <div style="font-size:36px; letter-spacing:0.08em; background:linear-gradient(135deg,#3D8DC9,#5AABDF,#7DC3EE); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1;">DE BÉISBOL</div>
  </div>
  <div style="width:100%; height:1px; background: var(--color-lab-border); margin: 4px 0;"></div>
  <div class="bar" style="gap:20px; align-items:baseline;">
    <div class="label" style="min-width:28px;">H1</div>
    <div style="font-size:48px; letter-spacing:0.05em; color:#F0F8FF; line-height:1;">TABLA DE POSICIONES</div>
  </div>
  <div class="bar" style="gap:20px; align-items:baseline;">
    <div class="label" style="min-width:28px;">H2</div>
    <div style="font-size:28px; letter-spacing:0.1em; color:#F0F8FF;">NUESTROS CLUBES</div>
  </div>
  <div class="bar" style="gap:20px; align-items:baseline;">
    <div class="label" style="min-width:28px;">H3</div>
    <div style="font-size:20px; letter-spacing:0.1em; color:#5AABDF;">RESULTADOS</div>
  </div>
  <div class="bar" style="gap:20px; align-items:baseline;">
    <div class="label" style="min-width:28px;">NUM</div>
    <div style="font-size:52px; letter-spacing:0.02em; color:#F0F8FF; line-height:1;">7 — 3</div>
  </div>
</body>
</html>
