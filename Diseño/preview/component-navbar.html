<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-condensed); padding: 0; min-height: 200px; overflow: hidden; }
  .section-label { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.2em; color: var(--color-lab-gold); text-transform: uppercase; padding: 10px 12px 6px; }

  .topbar { height: 4px; background: linear-gradient(90deg, #3D8DC9, #5AABDF, #3D8DC9); }

  .navbar { background: rgba(11,29,58,0.97); border-bottom: 1px solid #1C3A68; }
  .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; }

  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-circle { width: 36px; height: 36px; border-radius: 50%; background: #5AABDF; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 18px; color: #060F20; }
  .logo-name { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.1em; color: #F0F8FF; }
  .logo-sub { font-family: var(--font-condensed); font-size: 9px; letter-spacing: 0.2em; color: #5AABDF; text-transform: uppercase; margin-left: 8px; }

  /* Hamburger button */
  .hamburger { width: 36px; height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; border-radius: 6px; transition: background 0.2s; }
  .hamburger:hover { background: #0F2040; }
  .hamburger span { display: block; width: 20px; height: 2px; background: #94A3B8; border-radius: 2px; transition: all 0.25s; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: #5AABDF; }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: #5AABDF; }

  /* Drawer */
  .drawer { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #0B1D3A; border-left: 1px solid #1C3A68; z-index: 50; transition: right 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
  .drawer.open { right: 0; }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #1C3A68; height: 64px; }
  .drawer-logo { display: flex; align-items: center; gap: 8px; }
  .drawer-close { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #64748B; cursor: pointer; transition: all 0.15s; }
  .drawer-close:hover { background: #0F2040; color: #F0F8FF; }
  .drawer-nav { flex: 1; padding: 10px 10px; overflow-y: auto; }
  .drawer-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; font-family: var(--font-condensed); font-size: 14px; letter-spacing: 0.06em; color: #94A3B8; margin-bottom: 2px; cursor: pointer; transition: all 0.15s; }
  .drawer-link:hover, .drawer-link.active { color: #F0F8FF; background: #0F2040; }
  .drawer-link.active svg { color: #5AABDF; }
  .drawer-link svg { color: #64748B; flex-shrink: 0; transition: color 0.15s; }
  .drawer-link:hover svg { color: #5AABDF; }
  .drawer-divider { height: 1px; background: #1C3A68; margin: 8px 0; }
  .drawer-liga { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; font-family: var(--font-condensed); font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #5AABDF; cursor: pointer; transition: background 0.15s; }
  .drawer-liga:hover { background: #0F2040; }
  .drawer-admin { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; font-family: var(--font-condensed); font-size: 14px; letter-spacing: 0.06em; color: #64748B; cursor: pointer; transition: all 0.15s; }
  .drawer-admin:hover { color: #F0F8FF; background: #0F2040; }

  /* Scrim */
  .scrim { position: fixed; inset: 0; background: rgba(6,15,32,0.6); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .scrim.open { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<div class="topbar"></div>
<nav class="navbar">
  <div class="nav-inner">
    <div class="logo">
      <div class="logo-circle">L</div>
      <span class="logo-name">LAB</span>
      <span class="logo-sub">Liga Argentina de Béisbol</span>
    </div>
    <div class="hamburger" id="hamburger" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>

<!-- Scrim -->
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-logo">
      <div class="logo-circle" style="width:28px;height:28px;font-size:14px;">L</div>
      <span style="font-family:var(--font-display);font-size:16px;letter-spacing:0.1em;color:#F0F8FF;">LAB</span>
    </div>
    <div class="drawer-close" onclick="closeDrawer()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div class="drawer-nav">
    <div class="drawer-link active">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </div>
    <div class="drawer-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Clubes
    </div>
    <div class="drawer-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Fixture
    </div>
    <div class="drawer-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg>
      Noticias
    </div>
    <div class="drawer-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Jugadores
    </div>
    <div class="drawer-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Archivo
    </div>
    <div class="drawer-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Trivias
    </div>
    <div class="drawer-divider"></div>
    <div class="drawer-liga">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
      La Liga
    </div>

    <!-- Auth state: logged out -->
    <div id="auth-logged-out">
      <div class="drawer-divider"></div>
      <div class="drawer-link" style="color:#5AABDF;" onclick="simulateLogin()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Iniciar Sesión
      </div>
    </div>

    <!-- Auth state: logged in as admin (hidden by default) -->
    <div id="auth-logged-in" style="display:none;">
      <div class="drawer-divider"></div>
      <!-- User info -->
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:2px;">
        <div style="width:28px;height:28px;border-radius:50%;background:#0F2040;border:1px solid #1C3A68;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;color:#5AABDF;flex-shrink:0;">E</div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#F0F8FF;letter-spacing:0.04em;">Ezequiel C.</div>
          <div style="display:flex;align-items:center;gap:4px;margin-top:1px;">
            <span id="role-dot" style="width:5px;height:5px;border-radius:50%;background:#FBBF24;display:inline-block;"></span>
            <span id="role-label" style="font-size:9px;letter-spacing:0.14em;color:#64748B;text-transform:uppercase;">Admin Liga</span>
          </div>
        </div>
      </div>
      <div class="drawer-admin" style="color:#5AABDF;">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Administración
      </div>
      <div class="drawer-link" style="color:#64748B;font-size:12px;" onclick="simulateLogout()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </div>
    </div>

    <!-- Role switcher (demo only) -->
    <div style="margin-top:auto;padding:10px 12px 4px;border-top:1px solid #1C3A68;margin-top:12px;">
      <div style="font-size:9px;letter-spacing:0.14em;color:#64748B;text-transform:uppercase;margin-bottom:6px;">Demo — cambiar rol</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">
        <button onclick="setRole('admin')" style="font-family:var(--font-condensed);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:9999px;border:1px solid #FBBF2444;background:#FBBF2412;color:#FBBF24;cursor:pointer;">Admin</button>
        <button onclick="setRole('editor')" style="font-family:var(--font-condensed);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:9999px;border:1px solid #34D39944;background:#34D39912;color:#34D399;cursor:pointer;">Editor</button>
        <button onclick="setRole('journalist')" style="font-family:var(--font-condensed);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:9999px;border:1px solid #38BDF844;background:#38BDF812;color:#38BDF8;cursor:pointer;">Periodista</button>
        <button onclick="simulateLogout()" style="font-family:var(--font-condensed);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:9999px;border:1px solid #64748B44;background:#64748B12;color:#64748B;cursor:pointer;">Invitado</button>
      </div>
    </div>
  </div>
</div>

<div class="section-label">Navbar — Hamburger con drawer deslizable desde la derecha</div>

<script>
  function toggleDrawer() {
    const open = document.getElementById('drawer').classList.contains('open');
    open ? closeDrawer() : openDrawer();
  }
  function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('scrim').classList.add('open');
    document.getElementById('hamburger').classList.add('open');
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('scrim').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }

  const ROLES = {
    admin:      { label: 'Admin Liga',  dot: '#FBBF24' },
    editor:     { label: 'Editor Club', dot: '#34D399' },
    journalist: { label: 'Periodista',  dot: '#38BDF8' },
  };

  let currentRole = null;

  function simulateLogin() {
    setRole('admin');
  }

  function simulateLogout() {
    currentRole = null;
    document.getElementById('auth-logged-out').style.display = '';
    document.getElementById('auth-logged-in').style.display = 'none';
  }

  function setRole(role) {
    currentRole = role;
    const r = ROLES[role];
    document.getElementById('role-label').textContent = r.label;
    document.getElementById('role-dot').style.background = r.dot;
    document.getElementById('auth-logged-out').style.display = 'none';
    document.getElementById('auth-logged-in').style.display = '';
  }
</script>
</body>
</html>
