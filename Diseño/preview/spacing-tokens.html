<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-lab-dark); font-family: var(--font-condensed); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .section-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--color-lab-gold); text-transform: uppercase; margin-bottom: 6px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* Radii demo */
  .radius-box { width: 44px; height: 44px; background: var(--color-lab-surface); border: 1px solid var(--color-lab-border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .radius-label { font-size: 9px; letter-spacing: 0.08em; color: var(--color-lab-muted); text-align: center; }

  /* Elevation demo */
  .elev { padding: 8px 14px; border: 1px solid var(--color-lab-border); border-radius: var(--radius-lg); }
  .elev-label { font-size: 10px; letter-spacing: 0.12em; color: var(--color-lab-muted); text-transform: uppercase; margin-bottom: 2px; }
  .elev-hex { font-size: 11px; color: var(--color-lab-white); letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Corner Radii</div>
    <div class="row">
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="radius-box" style="border-radius:4px;"></div>
        <div class="radius-label">sm<br/>4px</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="radius-box" style="border-radius:6px;"></div>
        <div class="radius-label">md<br/>6px</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="radius-box" style="border-radius:8px;"></div>
        <div class="radius-label">lg<br/>8px</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="radius-box" style="border-radius:12px;"></div>
        <div class="radius-label">xl<br/>12px</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div class="radius-box" style="border-radius:9999px; width:44px;"></div>
        <div class="radius-label">full<br/>∞</div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Elevation System (bg steps, no shadows)</div>
    <div class="row">
      <div class="elev" style="background:#060F20;">
        <div class="elev-label">Layer 0 — dark</div>
        <div class="elev-hex">#060F20</div>
      </div>
      <div class="elev" style="background:#0B1D3A;">
        <div class="elev-label">Layer 1 — navy</div>
        <div class="elev-hex">#0B1D3A</div>
      </div>
      <div class="elev" style="background:#0F2040;">
        <div class="elev-label">Layer 2 — surface</div>
        <div class="elev-hex">#0F2040</div>
      </div>
      <div class="elev" style="background:#162D54;">
        <div class="elev-label">Layer 3 — surface-light</div>
        <div class="elev-hex">#162D54</div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Border</div>
    <div class="row">
      <div style="padding:8px 16px; border:1px solid #1C3A68; border-radius:8px; font-size:11px; color:var(--color-lab-muted);">
        Default border — #1C3A68
      </div>
      <div style="padding:8px 16px; border:1px solid rgba(90,171,223,0.3); border-radius:8px; font-size:11px; color:var(--color-lab-gold);">
        Hover border — gold/30
      </div>
      <div style="padding:8px 16px; border:1px solid rgba(90,171,223,0.5); border-radius:8px; font-size:11px; color:var(--color-lab-gold);">
        Active border — gold/50
      </div>
    </div>
  </div>
</body>
</html>
